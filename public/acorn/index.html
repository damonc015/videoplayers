<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Acorn Player</title>
    <link href="build/acornmediaplayer.base.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <video id="video1" preload="auto" muted
      poster="https://dlib.nyu.edu/files/av/tamwag/rosie/2_ESTHER_HORNE/2_ESTHER_HORNE_thumbnail.jpg">
    </video>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.4/jquery.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jqueryui/1.12.1/jquery-ui.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
    <script src="build/jquery.acornmediaplayer.js"></script>
    <script>
      var src = "https://stream.dlib.nyu.edu/hls-vod/tamwag/rosie/2_ESTHER_HORNE_REEL_1_manifest.m3u8";
      var video = document.getElementById("video1");

      if (Hls.isSupported()) {
        var hls = new Hls();
        hls.loadSource(src);
        hls.attachMedia(video);
        hls.on(Hls.Events.MEDIA_ATTACHED, function () {
          $(video).acornMediaPlayer();
        });
      } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
        // Safari: native HLS support
        video.src = src;
        $(document).ready(function () { $(video).acornMediaPlayer(); });
      }
    </script>
  </body>
</html>
