<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Plyr Player</title>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.8.4/plyr.css" />
  </head>
  <body>
    <video id="video1" preload="auto"
      poster="https://dlib.nyu.edu/files/av/tamwag/rosie/2_ESTHER_HORNE/2_ESTHER_HORNE_thumbnail.jpg">
    </video>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
    <script src="https://cdn.plyr.io/3.8.4/plyr.polyfilled.js"></script>
    <script>
      var src = "https://stream.dlib.nyu.edu/hls-vod/tamwag/rosie/2_ESTHER_HORNE_REEL_1_manifest.m3u8";

      var player = new Plyr("#video1");

      if (Hls.isSupported()) {
        var hls = new Hls();
        hls.loadSource(src);
        hls.attachMedia(player.media);
      } else if (player.media.canPlayType("application/vnd.apple.mpegurl")) {
        player.media.src = src;
      }
    </script>
  </body>
</html>
