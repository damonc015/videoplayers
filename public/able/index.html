<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Able Player</title>
    <link rel="stylesheet" href="build/ableplayer.min.css" />
    <style>
      .able-wrapper {
        width: 640px !important;
        max-width: 100%;
      }
      .able-wrapper video {
        width: 100% !important;
        height: auto !important;
      }

      /* fullscreen controls  fading out */
      .able-player.fade-out {
        opacity: 1 !important;
        visibility: visible !important;
        transition: none !important;
      }

      /* buffer spinner overlay */
      #buffer-spinner {
        display: none;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 48px;
        height: 48px;
        border: 5px solid rgba(255,255,255,0.3);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        z-index: 9999;
        pointer-events: none;
      }
      #buffer-spinner.visible { display: block; }
      @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

      .able-wrapper { position: relative; }
    </style>
  </head>
  <body>
    <video id="video1" data-able-player preload="auto"
      poster="https://dlib.nyu.edu/files/av/tamwag/rosie/2_ESTHER_HORNE/2_ESTHER_HORNE_thumbnail.jpg">
      <source
        type="application/x-mpegURL"
        src="https://stream.dlib.nyu.edu/hls-vod/tamwag/rosie/2_ESTHER_HORNE_REEL_1_manifest.m3u8"
      />
      <!-- <track kind="captions" src="../sample.vtt" /> -->
    </video>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest/dist/hls.min.js"></script>
    <script src="build/ableplayer.min.js"></script>
    <script>
      var video = document.getElementById("video1");

      window.addEventListener("load", function () {
        var spinner = document.createElement("div");
        spinner.id = "buffer-spinner";
        var wrapper = document.querySelector(".able-wrapper");
        if (wrapper) wrapper.appendChild(spinner);

        // detect stalls: currentTime stops advancing while playing
        var lastTime = 0;
        var stalledFor = 0;
        setInterval(function () {
          if (!video.paused && !video.ended) {
            if (video.currentTime === lastTime) {
              stalledFor += 500;
              if (stalledFor >= 1000) spinner.classList.add("visible");
            } else {
              stalledFor = 0;
              spinner.classList.remove("visible");
            }
            lastTime = video.currentTime;
          } else {
            stalledFor = 0;
            spinner.classList.remove("visible");
          }
        }, 500);
      });
    </script>
  </body>
</html>
